cloud_cost:
  right_sizing_buffer: 1.20
  
  pricing_model_multipliers:
    on_demand: 1.00
    reserved_1yr: 0.65
    reserved_3yr: 0.45
  
  egress_and_iops_rate: 0.065
  managed_services_premium: 0.20

# ── On-Premise Cost Engine Parameters ────────────────────────────────────────
# All financial assumptions for on-prem TCO calculation.
# Modify these values here; no Python source changes needed.
cost_engine:
  # Server hardware capital expenditure ($/server, one-time)
  server_unit_cost: 5000
  # Annual server maintenance as % of hardware CapEx
  maintenance_rate: 0.15
  # Annual power & cooling cost per server ($)
  power_cost_per_server: 500
  # Annual IT admin salary ($)
  admin_salary: 80000
  # Number of servers one admin can manage
  servers_per_admin: 25
  # Annual storage operational cost ($/TB/year)
  storage_cost_per_tb: 150
  # One-time storage hardware CapEx ($/TB)
  storage_hardware_cost_per_tb: 500
  # Annual facilities overhead as % of hardware CapEx (PUE, cooling, security)
  facilities_overhead_rate: 0.12

  # Migration economics: labor multipliers and double-run windows per strategy
  migration_economics:
    Rehost:
      labor_multiplier: 1.0
      double_run_months: 1.5
    Replatform:
      labor_multiplier: 2.5
      double_run_months: 4.5
    Refactor:
      labor_multiplier: 10.0
      double_run_months: 12.0
    Hybrid:
      labor_multiplier: 3.0
      double_run_months: 6.0

  # Baseline annual migration labor cost per server ($)
  baseline_labor_per_server: 2000
  # Labour reduction for teams with strong cloud expertise (0–1)
  skilled_team_discount: 0.30
  # Labour reduction for teams with automated CI/CD pipelines (0–1)
  cicd_discount: 0.20

strategy_prediction:
  # Base failure probability per strategy
  base_failure_rates:
    "Lift-and-Shift": 0.08
    "Retain On-Premise": 0.05
    "Hybrid Migration": 0.22
    "Cloud-Native Migration": 0.38
    
  # Cost tiers (1=Low, 3=High)
  strategy_cost_tier:
    "Lift-and-Shift": 1
    "Retain On-Premise": 1
    "Hybrid Migration": 2
    "Cloud-Native Migration": 3

  # Labor cost multipliers for execution complexity
  strategy_labor_mult:
    "Lift-and-Shift": 1.0
    "Retain On-Premise": 1.0
    "Hybrid Migration": 3.0
    "Cloud-Native Migration": 10.0

risk_nlp:
  # Score mapping
  severity_scores:
    "Low": 1
    "Medium": 2
    "High": 3
    "Critical": 4
